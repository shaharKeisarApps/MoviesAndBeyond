name: Update Screenshot References

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update screenshots on'
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: update-screenshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-screenshots:
    name: Update Screenshot References
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Determine branch
        id: branch
        run: |
          if [ -n "${{ github.event.inputs.branch }}" ]; then
            echo "ref=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.branch.outputs.ref }}

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Get local.properties from secret
        run: echo "${{ secrets.LOCAL_PROPERTIES }}" > ./local.properties

      - name: Setup Java JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Update screenshot reference images
        run: ./gradlew updateDebugScreenshotTest

      - name: Commit and push updated references
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '**/screenshotTest/reference/**'
          if git diff --staged --quiet; then
            echo "No screenshot changes to commit"
          else
            git commit -m "Update screenshot reference images from CI"
            git push origin ${{ steps.branch.outputs.ref }}
          fi
